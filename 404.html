<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | Plan-Examiner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #030d1a; color: #e2e8f0; font-family: Inter, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    h1 { font-size: 5rem; font-weight: 900; background: linear-gradient(135deg, #fff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
    p { color: #64748b; margin-bottom: 24px; }
    a { display: inline-block; background: #38bdf8; color: #030d1a; font-weight: 700; padding: 12px 28px; border-radius: 999px; text-decoration: none; transition: background .2s; }
    a:hover { background: #0ea5e9; }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>The page you're looking for doesn't exist.</p>
